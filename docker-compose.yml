version: "3.9"

services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ai-agent-backend
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./vectorstore:/app/vectorstore
      - ./logs:/app/logs
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ai-agent-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped